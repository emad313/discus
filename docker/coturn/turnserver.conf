# Coturn TURN/STUN Server Configuration
# Essential for WebRTC NAT traversal

# Listening port for TURN/STUN
listening-port=3478
tls-listening-port=5349

# Listening IP
listening-ip=0.0.0.0

# External IP (will be auto-detected)
# external-ip=YOUR_PUBLIC_IP

# Relay IP
relay-ip=0.0.0.0

# Enable fingerprints
fingerprint

# Use long-term credentials
lt-cred-mech

# User credentials (change these!)
user=turnuser:turnpassword

# Realm
realm=discus.local

# Total quota (for 100 users)
total-quota=100
bps-capacity=0

# Max relayed bandwidth per user
max-bps=1000000

# Logging
log-file=/var/log/turnserver.log
verbose

# No multicast
no-multicast-peers

# Deny private IP ranges in relay
no-loopback-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Allow all origins (for development)
no-tlsv1
no-tlsv1_1
no-tlsv1_2

# Optimization for 100+ users
min-port=49152
max-port=65535

# Enable STUN
stun-only=false

# Enable mobility
mobility

# Server name
server-name=discus-turn
